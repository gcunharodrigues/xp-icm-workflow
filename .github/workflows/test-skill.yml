name: test-skill

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  pytest-and-bats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@test"
          git config --global user.name "ci"
          git config --global init.defaultBranch main

      - name: Pre-flight runtime check
        run: bash scripts/check-runtime.sh

      - name: Run tests (pytest unit + bats integration + e2e)
        run: bash tests/run.sh

      - name: Coverage XML report
        run: |
          python -m pytest tests/unit/ \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term \
            --quiet

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  validate-templates:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Validate L2 templates schema
        run: python -m pytest tests/unit/test_l2_templates.py -v

      - name: Validate stop-points render
        run: python -m pytest tests/unit/test_stop_points_render.py -v
